allow-unwrap-in-tests = true
allow-expect-in-tests = true

disallowed-types = [
  { path = "std::fs::File", reason = "route fs through FsHost via cx.global" },
  { path = "std::fs::OpenOptions", reason = "route fs through FsHost via cx.global" },
  { path = "std::fs::ReadDir", reason = "route fs through FsHost via cx.global" },
  { path = "std::fs::Metadata", reason = "route fs through FsHost via cx.global" },
  { path = "std::net::TcpStream", reason = "route net through a Host trait" },
  { path = "std::net::TcpListener", reason = "route net through a Host trait" },
  { path = "std::net::UdpSocket", reason = "route net through a Host trait" },
  { path = "std::process::Command", reason = "route process through ShellHost via cx.global" },
  { path = "std::process::Child", reason = "route process through ShellHost via cx.global" },
  { path = "tokio::fs::File", reason = "route fs through FsHost via cx.global" },
  { path = "tokio::process::Command", reason = "route process through ShellHost via cx.global", allow-invalid = true },
  { path = "tokio::process::Child", reason = "route process through ShellHost via cx.global", allow-invalid = true },
  { path = "tokio::net::TcpStream", reason = "route net through a Host trait" },
  { path = "tokio::net::TcpListener", reason = "route net through a Host trait" },
  { path = "tokio::net::UdpSocket", reason = "route net through a Host trait" },
]

disallowed-methods = [
  { path = "std::env::var", reason = "use EnvHost via cx.global" },
  { path = "std::env::var_os", reason = "use EnvHost via cx.global" },
  { path = "std::env::vars", reason = "use EnvHost via cx.global" },
  { path = "std::env::vars_os", reason = "use EnvHost via cx.global" },
  { path = "std::fs::read", reason = "use FsHost via cx.global" },
  { path = "std::fs::read_to_string", reason = "use FsHost via cx.global" },
  { path = "std::fs::write", reason = "use FsHost via cx.global" },
  { path = "std::fs::create_dir", reason = "use FsHost via cx.global" },
  { path = "std::fs::create_dir_all", reason = "use FsHost via cx.global" },
  { path = "std::fs::remove_file", reason = "use FsHost via cx.global" },
  { path = "std::fs::remove_dir", reason = "use FsHost via cx.global" },
  { path = "std::fs::remove_dir_all", reason = "use FsHost via cx.global" },
  { path = "std::fs::rename", reason = "use FsHost via cx.global" },
  { path = "std::fs::metadata", reason = "use FsHost via cx.global" },
  { path = "tokio::fs::read", reason = "use FsHost via cx.global" },
  { path = "tokio::fs::read_to_string", reason = "use FsHost via cx.global" },
  { path = "tokio::fs::write", reason = "use FsHost via cx.global" },
  { path = "tokio::fs::create_dir", reason = "use FsHost via cx.global" },
  { path = "tokio::fs::create_dir_all", reason = "use FsHost via cx.global" },
]
