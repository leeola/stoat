[package]
name = "stoat_bin"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
readme = "../README.md"
authors = ["Lee Olayvar <leegit@fastmail.com>"]
license-file = "../LICENSE"

[[bin]]
name = "stoat"
path = "src/bin/stoat.rs"

[lib]
name = "stoat_bin"
path = "src/lib.rs"

[lints]
workspace = true

# `cargo build --features profiling` streams hot-path spans to the Tracy
# profiler; run with `TRACY_NO_EXIT=1` to keep the client connected.
[features]
profiling = ["stoat_log/profiling"]

[dependencies]
stoat = { path = "../stoat", features = ["builtin-lsp"] }
stoat_agent_claude_code = { path = "../agent/claude_code" }
stoat_config = { path = "../config" }
stoat_gui = { path = "../gui" }
stoat_language = { path = "../language" }
stoat_log = { path = "../log" }
stoat_scheduler = { path = "../scheduler" }
blake3 = { workspace = true }
clap.workspace = true
etcetera.workspace = true
serde.workspace = true
serde_json.workspace = true
snafu.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["time", "net"] }
tempfile.workspace = true
time.workspace = true

[dev-dependencies]
git2 = { version = "0.20", default-features = false }
insta = "1"
stoat_host = { path = "../host" }
