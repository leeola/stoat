# Default stoatty configuration.
#
# Copy this file to <XDG_CONFIG_HOME>/stoatty/config.toml (usually
# ~/.config/stoatty/config.toml) and edit it to override these defaults. Fields
# left out there keep the values below.

# Font size in logical points. The renderer scales it by the display's scale
# factor for the physical rasterization size, so it looks the same on a HiDPI
# (Retina) and a standard display.
font_size = 15

# Ordered cascade of font family names, most preferred first. The renderer shapes
# text with the first family installed; "monospace" is a generic fallback to the
# system's default monospace.
font_family = ["JetBrains Mono", "monospace"]

# Name of the [themes.<name>] entry the terminal resolves colors against.
theme = "zed"

# Shape contiguous same-style cell runs together so the font's ligatures (->,
# =>, ==, ...) form across cells. Set to false to shape each cell on its own, so
# no ligatures appear.
ligatures = true

# Cursor motion style. "block" is the rigid square that slides between cells.
# "warp" stretches the cursor along its path, then snaps back to a block.
cursor_animation = "block"

# Program to launch over the PTY instead of your default shell. Uncomment and
# set `program` to override; `args` is optional and defaults to none. Left out,
# stoatty runs your default shell.
# [shell]
# program = "/bin/bash"
# args = ["--login"]

# Zed's One Dark terminal palette. Colors are #rrggbb hex strings; an omitted
# field keeps the built-in default for that slot.
[themes.zed]
background = "#282c34"
foreground = "#abb2bf"
cursor = "#74ade8"
black = "#282c34"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#abb2bf"
bright_black = "#636d83"
bright_red = "#ea858b"
bright_green = "#aad581"
bright_yellow = "#ffd885"
bright_blue = "#85c1ff"
bright_magenta = "#d398eb"
bright_cyan = "#6ed5de"
bright_white = "#fafafa"
